name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish this tag after real-machine validation
        type: boolean
        required: true
        default: false
      windows_real_machine_verified:
        description: Windows portable launch, unsigned warning, remote drives, and disposable filesystem operations passed
        type: boolean
        required: true
        default: false
      macos_real_machine_verified:
        description: Signed/notarized macOS install, launch, and disposable filesystem operations passed
        type: boolean
        required: true
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Validate release source
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test release checks
        run: pnpm release:check:test

      - name: Run release checks
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: pnpm release:check

      - name: Validate publication attestation
        if: inputs.publish == true
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "Publication must be dispatched from the validated version tag."
            exit 1
          fi
          if [ "${{ inputs.windows_real_machine_verified }}" != "true" ] || [ "${{ inputs.macos_real_machine_verified }}" != "true" ]; then
            echo "Both candidate packages require real-machine filesystem-operation attestation."
            exit 1
          fi

      - name: Upload release-check evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-check
          path: |
            .release-checks/latest.json
            .release-checks/latest.md
          if-no-files-found: warn

      - name: Validate release state
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH: ${{ inputs.publish || false }}
        run: |
          state=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft 2>/dev/null || echo missing)
          if [ "$EVENT_NAME" = "push" ] && [ "$state" != "missing" ]; then
            echo "Release $GITHUB_REF_NAME already exists; refusing to replace it."
            exit 1
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$PUBLISH" = "true" ] && [ "$state" != "true" ]; then
            echo "Release $GITHUB_REF_NAME must exist as a draft before publication."
            exit 1
          fi

  build-windows:
    name: Package Windows
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: validate
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test native file operations on Windows
        run: cargo test -p explorie-core

      - name: Check Windows signing prerequisites
        id: signing
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          $available = [bool]$env:CERTIFICATE -and [bool]$env:CERTIFICATE_PASSWORD
          if (-not $available) { Write-Warning "The Windows portable executable will be unsigned." }
          "available=$($available.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Build application executable
        run: pnpm --filter explorie-desktop exec -- tauri build --no-bundle --ci -- --locked

      - name: Verify bundled native dependencies
        shell: pwsh
        run: |
          $rclone = "target/release/rclone.exe"
          if (-not (Test-Path -LiteralPath $rclone -PathType Leaf)) { throw "Bundled rclone executable was not built." }
          $version = & $rclone version | Select-Object -First 1
          if ($version -ne "rclone v1.74.4") { throw "Unexpected bundled rclone version: $version" }
          $winfsp = "apps/desktop/frontend/src-tauri/resources/winfsp-2.1.25156.msi"
          if (-not (Test-Path -LiteralPath $winfsp -PathType Leaf)) { throw "Bundled WinFsp installer was not prepared." }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $winfsp).Hash.ToLowerInvariant()
          if ($hash -ne "073a70e00f77423e34bed98b86e600def93393ba5822204fac57a29324db9f7a") { throw "WinFsp installer hash mismatch." }
          $signature = Get-AuthenticodeSignature -LiteralPath $winfsp
          if ($signature.Status -ne "Valid" -or $signature.SignerCertificate.Subject -notmatch "NAVIMATICS") {
            throw "WinFsp installer signature is invalid."
          }

      - name: Locate Windows signing tool
        if: steps.signing.outputs.available == 'true'
        id: signtool
        shell: pwsh
        run: |
          $tool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $tool) { throw "signtool.exe was not found." }
          "path=$($tool.FullName)" >> $env:GITHUB_OUTPUT

      - name: Sign application executable
        if: steps.signing.outputs.available == 'true'
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          SIGNTOOL: ${{ steps.signtool.outputs.path }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "explorie-codesign.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:CERTIFICATE))
          foreach ($executable in @("target/release/explorie-desktop.exe", "target/release/rclone.exe")) {
            & $env:SIGNTOOL sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $certificatePath /p $env:CERTIFICATE_PASSWORD $executable
            if ($LASTEXITCODE -ne 0) { throw "Executable signing failed: $executable" }
            & $env:SIGNTOOL verify /pa /v $executable
            if ($LASTEXITCODE -ne 0) { throw "Executable signature verification failed: $executable" }
          }
          Remove-Item -LiteralPath $certificatePath -Force

      - name: Restore Enigma Virtual Box installer cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/enigma-virtual-box/enigmavb.exe
          key: enigma-virtual-box-AB743F5E3DD927A288E126BBB053D367F270592E89378C9A06B7F3B15FA1EE35

      - name: Install Enigma Virtual Box
        shell: pwsh
        run: |
          $cache = Join-Path $env:RUNNER_TOOL_CACHE "enigma-virtual-box"
          $installer = Join-Path $cache "enigmavb.exe"
          $expectedHash = "AB743F5E3DD927A288E126BBB053D367F270592E89378C9A06B7F3B15FA1EE35"
          New-Item -ItemType Directory -Force -Path $cache | Out-Null

          if (-not (Test-Path -LiteralPath $installer -PathType Leaf)) {
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                Invoke-WebRequest -Uri "https://www.enigmaprotector.com/assets/files/enigmavb.exe" -OutFile $installer -UseBasicParsing -MaximumRedirection 5
                break
              } catch {
                if ($attempt -eq 3) { throw }
                Start-Sleep -Seconds 2
              }
            }
          }
          $hash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash
          if ($hash -ne $expectedHash) { throw "Enigma Virtual Box installer hash mismatch." }
          $signature = Get-AuthenticodeSignature -LiteralPath $installer
          if ($signature.Status -ne "Valid" -or $signature.SignerCertificate.Subject -notmatch "enigmaprotector\.com") {
            throw "Enigma Virtual Box installer signature is invalid."
          }

          $install = Start-Process -FilePath $installer -ArgumentList @("/VERYSILENT", "/NORESTART") -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Enigma Virtual Box installation failed with exit code $($install.ExitCode)." }
          $console = @(
            "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe",
            "C:\Program Files\Enigma Virtual Box\enigmavbconsole.exe"
          ) | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } | Select-Object -First 1
          if (-not $console) { throw "enigmavbconsole.exe was not found after installation." }
          "EVB_CONSOLE=$console" >> $env:GITHUB_ENV

      - name: Build Windows portable executable
        shell: pwsh
        run: |
          $input = "target/release/explorie-desktop.exe"
          $rclone = "target/release/rclone.exe"
          $winfsp = "apps/desktop/frontend/src-tauri/resources/winfsp-2.1.25156.msi"
          if (-not (Test-Path -LiteralPath $input -PathType Leaf)) { throw "Application executable was not found." }
          if (-not (Test-Path -LiteralPath $rclone -PathType Leaf)) { throw "rclone executable was not found." }

          $staging = Join-Path $env:RUNNER_TEMP "explorie-evb"
          New-Item -ItemType Directory -Force -Path $staging, "$staging/installers", "$staging/licenses" | Out-Null
          Copy-Item -LiteralPath $rclone -Destination "$staging/rclone.exe"
          Copy-Item -LiteralPath $winfsp -Destination "$staging/installers/winfsp-2.1.25156.msi"
          Copy-Item -LiteralPath "apps/desktop/frontend/src-tauri/resources/rclone-COPYING" -Destination "$staging/licenses/rclone-COPYING"
          Copy-Item -LiteralPath "apps/desktop/frontend/src-tauri/resources/winfsp-NOTICE.txt" -Destination "$staging/licenses/winfsp-NOTICE.txt"

          $project = Join-Path $env:RUNNER_TEMP "explorie.evb"
          $output = "target/release/explorie-portable.exe"
          pnpm --package=@insco/enigma-virtualbox@1.3.4 dlx enigmavirtualbox generate $staging `
            --input $input `
            --output $output `
            --project-name $project `
            --evbOptions.shareVirtualSystem False `
            --evbOptions.allowRunningOfVirtualExeFiles True `
            --evbOptions.mapExecutableWithTemporaryFile True
          if ($LASTEXITCODE -ne 0) { throw "Enigma Virtual Box project generation failed." }
          & $env:EVB_CONSOLE $project
          if ($LASTEXITCODE -ne 0) { throw "Enigma Virtual Box packaging failed." }
          if (-not (Test-Path -LiteralPath $output -PathType Leaf)) { throw "Portable executable was not created." }
          if ((Get-Item -LiteralPath $output).Length -le (Get-Item -LiteralPath $input).Length) {
            throw "Portable executable does not contain the staged resources."
          }

      - name: Sign and stage Windows portable executable
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          SIGNTOOL: ${{ steps.signtool.outputs.path }}
          SIGNING_AVAILABLE: ${{ steps.signing.outputs.available }}
        run: |
          $portable = "target/release/explorie-portable.exe"
          if ($env:SIGNING_AVAILABLE -eq "true") {
            $certificatePath = Join-Path $env:RUNNER_TEMP "explorie-codesign.pfx"
            [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:CERTIFICATE))
            & $env:SIGNTOOL sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $certificatePath /p $env:CERTIFICATE_PASSWORD $portable
            if ($LASTEXITCODE -ne 0) { throw "Portable executable signing failed." }
            & $env:SIGNTOOL verify /pa /v $portable
            if ($LASTEXITCODE -ne 0) { throw "Portable executable signature verification failed." }
            Remove-Item -LiteralPath $certificatePath -Force
          } elseif ((Get-AuthenticodeSignature -LiteralPath $portable).Status -ne "NotSigned") {
            throw "Unsigned portable executable has an unexpected Authenticode status."
          }

          $version = (Get-Content package.json | ConvertFrom-Json).version
          $staging = "release-artifacts/windows"
          New-Item -ItemType Directory -Force $staging | Out-Null
          $suffix = if ($env:SIGNING_AVAILABLE -eq "true") { "" } else { "-unsigned" }
          $asset = Join-Path $staging "explorie-$version-windows-x64-portable$suffix.exe"
          Copy-Item -LiteralPath $portable -Destination $asset
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset).Hash.ToLowerInvariant()
          "$hash *$(Split-Path $asset -Leaf)" | Set-Content -Encoding ascii (Join-Path $staging "SHA256SUMS-windows.txt")

      - name: Smoke test Windows portable executable
        shell: pwsh
        run: |
          $portable = @(Get-ChildItem release-artifacts/windows/*-windows-x64-portable*.exe)
          if ($portable.Count -ne 1) { throw "Expected exactly one portable executable." }
          $debugPort = 9331
          $env:WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS = "--remote-debugging-port=$debugPort"
          $app = Start-Process -FilePath $portable[0].FullName -WorkingDirectory $portable[0].DirectoryName -PassThru
          try {
            $webviewReady = $false
            for ($attempt = 0; $attempt -lt 40; $attempt++) {
              Start-Sleep -Milliseconds 500
              $app.Refresh()
              if ($app.HasExited) { throw "Portable application exited during launch smoke test." }
              try {
                $targets = @(Invoke-RestMethod -Uri "http://127.0.0.1:$debugPort/json/list" -TimeoutSec 1)
              } catch {
                continue
              }
              if ($targets | Where-Object { $_.type -eq "page" -and $_.url -eq "http://tauri.localhost/" }) {
                $webviewReady = $true
                break
              }
            }
            if (-not $webviewReady) { throw "Portable application did not load the Tauri page in WebView2." }
          } finally {
            $app.Refresh()
            if (-not $app.HasExited) { Stop-Process -Id $app.Id -Force }
          }

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: explorie-windows
          path: release-artifacts/windows/*
          if-no-files-found: error

  build-macos:
    name: Package macOS
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: validate
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test native file operations on macOS
        run: cargo test -p explorie-core

      - name: Check Apple signing prerequisites
        id: signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          available=true
          for value in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!value}" ]; then available=false; fi
          done
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$available" != "true" ]; then
            echo "Tagged releases require all Apple signing and notarization secrets."
            exit 1
          fi
          if [ "$available" != "true" ]; then
            echo "::warning::Manual macOS package will use an ad-hoc signature and will not be notarized."
          fi
          echo "available=$available" >> "$GITHUB_OUTPUT"
          if [ "$available" = "true" ]; then
            echo "identity=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"
          else
            echo "identity=-" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple signing certificate
        if: steps.signing.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build macOS app and DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm --filter explorie-desktop exec -- tauri build --bundles dmg --ci -- --locked

      - name: Notarize and staple macOS DMG
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG, found ${#dmgs[@]}."
            exit 1
          fi
          xcrun notarytool submit "${dmgs[0]}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${dmgs[0]}"

      - name: Verify and stage macOS package
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_AVAILABLE: ${{ steps.signing.outputs.available }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG, found ${#dmgs[@]}."
            exit 1
          fi

          mount_point=$(mktemp -d)
          hdiutil attach "${dmgs[0]}" -nobrowse -readonly -mountpoint "$mount_point" >/dev/null
          cleanup() {
            hdiutil detach "$mount_point" -quiet || true
            rmdir "$mount_point" 2>/dev/null || true
          }
          trap cleanup EXIT

          apps=("$mount_point"/*.app)
          if [ "${#apps[@]}" -ne 1 ]; then
            echo "Expected exactly one app in the DMG."
            exit 1
          fi
          app="${apps[0]}"
          helper="$app/Contents/Resources/explorie-mountd"
          rclone="$app/Contents/MacOS/rclone"
          rclone_license="$app/Contents/Resources/licenses/rclone-COPYING"
          helper_plist="$app/Contents/Library/LaunchDaemons/com.omershatz.explorie.mountd.plist"
          test -x "$helper"
          test -x "$rclone"
          test -f "$rclone_license"
          test -f "$helper_plist"
          test "$("$rclone" version | head -n 1)" = 'rclone v1.74.4'
          /usr/libexec/PlistBuddy -c 'Print :BundleProgram' "$helper_plist" | grep -Fx 'Contents/Resources/explorie-mountd'
          /usr/libexec/PlistBuddy -c 'Print :AssociatedBundleIdentifiers:0' "$helper_plist" | grep -Fx 'com.omershatz.explorie'
          codesign --verify --strict --verbose=2 "$helper"
          codesign --verify --strict --verbose=2 "$rclone"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -d --verbose=4 "$helper" 2>&1 | grep -Fx 'Identifier=com.omershatz.explorie.mountd'
          codesign -d --verbose=4 "$app" 2>&1 | grep -Fx 'Identifier=com.omershatz.explorie'
          codesign -d --verbose=4 "$helper" 2>&1 | grep -E 'flags=.*runtime'
          codesign -d --verbose=4 "$app" 2>&1 | grep -E 'flags=.*runtime'
          if [ "$APPLE_SIGNING_AVAILABLE" = "true" ]; then
            codesign -d --verbose=4 "$helper" 2>&1 | grep -Fx "TeamIdentifier=$APPLE_TEAM_ID"
            codesign -d --verbose=4 "$rclone" 2>&1 | grep -Fx "TeamIdentifier=$APPLE_TEAM_ID"
            codesign -d --verbose=4 "$app" 2>&1 | grep -Fx "TeamIdentifier=$APPLE_TEAM_ID"
          fi

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            xcrun stapler validate "$app"
            xcrun stapler validate "${dmgs[0]}"
            spctl --assess --type execute --verbose=2 "$app"
            spctl --assess --type open --context context:primary-signature --verbose=2 "${dmgs[0]}"
          fi
          cleanup
          trap - EXIT

          version=$(node -p "require('./package.json').version")
          mkdir -p release-artifacts/macos
          asset="release-artifacts/macos/explorie-$version-macos-arm64.dmg"
          cp "${dmgs[0]}" "$asset"
          (cd release-artifacts/macos && shasum -a 256 "$(basename "$asset")" > SHA256SUMS-macos.txt)

      - name: Smoke test macOS DMG
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -ne 1 ]; then exit 1; fi

          mount_point=$(mktemp -d)
          hdiutil attach "${dmgs[0]}" -nobrowse -readonly -mountpoint "$mount_point" >/dev/null
          cleanup() { hdiutil detach "$mount_point" -quiet || true; }
          trap cleanup EXIT

          apps=("$mount_point"/*.app)
          if [ "${#apps[@]}" -ne 1 ]; then
            echo "Expected exactly one app in the DMG."
            exit 1
          fi
          installed_app="$RUNNER_TEMP/explorie-smoke-$GITHUB_RUN_ID.app"
          ditto "${apps[0]}" "$installed_app"
          cleanup
          trap - EXIT

          binary="$installed_app/Contents/MacOS/explorie-desktop"
          rclone="$installed_app/Contents/MacOS/rclone"
          if [ ! -x "$binary" ]; then
            echo "Installed application executable was not found."
            exit 1
          fi
          test -x "$rclone"
          test "$("$rclone" version | head -n 1)" = 'rclone v1.74.4'
          "$binary" >"$RUNNER_TEMP/explorie-smoke.log" 2>&1 &
          app_pid=$!
          sleep 8
          if ! kill -0 "$app_pid" 2>/dev/null; then
            cat "$RUNNER_TEMP/explorie-smoke.log"
            echo "Installed application exited during launch smoke test."
            exit 1
          fi
          kill "$app_pid"
          wait "$app_pid" || true

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: explorie-macos
          path: release-artifacts/macos/*
          if-no-files-found: error

  candidate:
    name: Create draft candidate release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [validate, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download candidate packages
        uses: actions/download-artifact@v4
        with:
          pattern: explorie-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify packages and create draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum --check SHA256SUMS-windows.txt
          sha256sum --check SHA256SUMS-macos.txt
          gh release create "$GITHUB_REF_NAME" ./* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

  publish:
    name: Publish verified draft release
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref_type == 'tag' &&
      inputs.publish == true &&
      inputs.windows_real_machine_verified == true &&
      inputs.macos_real_machine_verified == true
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download and verify draft assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir release-artifacts
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'explorie-*' \
            --pattern 'SHA256SUMS-*' \
            --dir release-artifacts
          cd release-artifacts
          sha256sum --check SHA256SUMS-windows.txt
          sha256sum --check SHA256SUMS-macos.txt
          shopt -s nullglob
          windows=(explorie-*-windows-x64-portable*.exe)
          macos=(explorie-*-macos-arm64.dmg)
          if [ "${#windows[@]}" -ne 1 ] || [ "${#macos[@]}" -ne 1 ]; then
            echo "Draft release must contain exactly one Windows portable executable and one macOS DMG."
            exit 1
          fi

      - name: Publish the verified draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
