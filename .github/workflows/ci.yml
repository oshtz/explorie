name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-frontend:
    name: Frontend Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm --filter explorie-desktop test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/desktop/frontend/coverage/
          retention-days: 30

      - name: Coverage summary
        run: |
          echo "## Frontend Coverage Report" >> $GITHUB_STEP_SUMMARY
          if [ -f apps/desktop/frontend/coverage/coverage-summary.json ]; then
            node -e "
              const summary = require('./apps/desktop/frontend/coverage/coverage-summary.json');
              const total = summary.total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + total.lines.pct + '% |');
              console.log('| Statements | ' + total.statements.pct + '% |');
              console.log('| Functions | ' + total.functions.pct + '% |');
              console.log('| Branches | ' + total.branches.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not available" >> $GITHUB_STEP_SUMMARY
          fi

  test-rust:
    name: Rust Tests & Coverage
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Prepare native dependencies
        run: |
          node scripts/prepare-rclone.mjs
          node scripts/prepare-winfsp.mjs

      - name: Run tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: lcov.info
          retention-days: 30

      - name: Coverage summary
        shell: bash
        run: |
          echo "## Rust Coverage Report" >> $GITHUB_STEP_SUMMARY
          if [ -f lcov.info ]; then
            cargo llvm-cov report --summary-only 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Coverage summary not available" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not generated" >> $GITHUB_STEP_SUMMARY
          fi

  test-rust-macos:
    name: macOS Core Tests & Tauri Build
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'

      - name: Test native file operations on macOS
        run: cargo test -p explorie-core

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS application
        run: pnpm --filter explorie-desktop exec -- tauri build --no-bundle --ci -- --locked

  test-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright on an isolated port
        env:
          CI: '1'
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:47173
          PLAYWRIGHT_WEB_COMMAND: pnpm --filter explorie-desktop exec vite --host 127.0.0.1 --port 47173 --strictPort
        run: pnpm exec playwright test

  lint:
    name: Lint & Type Check
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare native dependencies
        run: |
          node scripts/prepare-rclone.mjs
          node scripts/prepare-winfsp.mjs

      - name: TypeScript type check
        run: pnpm --filter explorie-desktop exec tsc --noEmit

      - name: ESLint
        run: pnpm lint:ts

      - name: Prettier check
        run: pnpm format:check

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Release workflow tests
        run: pnpm release:check:test

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run cargo audit
        run: |
          set -o pipefail
          echo "## Rust Security Audit" >> $GITHUB_STEP_SUMMARY
          cargo audit 2>&1 | tee -a $GITHUB_STEP_SUMMARY

      - name: Run pnpm audit
        run: |
          set -o pipefail
          echo "## Node.js Security Audit" >> $GITHUB_STEP_SUMMARY
          pnpm audit --audit-level=moderate 2>&1 | tee -a $GITHUB_STEP_SUMMARY
